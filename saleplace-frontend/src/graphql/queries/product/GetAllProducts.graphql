query getAllProducts($filters: ProductsFilterInput) {
  filters(filters: $filters) {
    items {
      id
      title
      slug
      price
      status
      averageRating
      reviewsCount
      images {
        url
      }
      category {
        id
        name
      }
      user {
        username
        displayName
        avatar
      }
      createdAt
    }
    meta {
      total
      page
      limit
      totalPages
    }
  }
}
